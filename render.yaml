services:
  - type: web
    name: groweasy-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash

  - type: web
    name: groweasy-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: npm run start --workspace @groweasy/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_NAME
        value: GrowEasy AI CSV Importer
      - key: NEXT_PUBLIC_API_URL
        sync: false
