services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_CORS_ORIGIN: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_APP_NAME: GrowEasy AI CSV Importer
        NEXT_PUBLIC_API_URL: http://localhost:4000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: GrowEasy AI CSV Importer
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
